server {
    listen       8088;
    listen       [::]:8088;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Ferrum 鐵鏈 白皮書 — single self-contained page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for the (online) fonts/static; the page itself is revalidated.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip            on;
    gzip_types      text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
